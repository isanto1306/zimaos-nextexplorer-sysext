name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          mkdir release
          cp -r install.sh uninstall.sh README.md LICENSE CHANGELOG.md files release/
          tar -czf nextexplorer-sysext.tar.gz release

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: nextexplorer-sysext.tar.gz
