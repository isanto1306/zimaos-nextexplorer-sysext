name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate install.sh
        run: bash -n install.sh

      - name: Validate uninstall.sh
        run: bash -n uninstall.sh

      - name: Check docker-compose
        run: |
          docker compose -f files/opt/nextexplorer/docker-compose.yml config
